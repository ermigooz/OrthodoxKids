<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - OrthodoxKids</title>
  <meta name="description" content="Test your knowledge of Orthodox Christianity with fun quizzes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@400;500;600;700&family=Noto+Sans+Ethiopic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body lang="en">

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <span class="logo-icon" aria-hidden="true">&#x2720;</span>
        <span class="logo-text">OrthodoxKids</span>
      </a>
      <div class="header-right">
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
        <nav class="main-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="fathers.html">Fathers</a>
          <a href="history.html">History</a>
          <a href="quiz.html">Quiz</a>
        </nav>
        <div class="lang-toggle" role="radiogroup" aria-label="Language selection">
          <button data-lang="en" role="radio" aria-checked="true">EN</button>
          <button data-lang="am" role="radio" aria-checked="false">&#x12A0;&#x121B;</button>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="page-section">
    <div class="container">
      <div class="section-header">
        <h1 id="page-title-quiz">Test Your Knowledge</h1>
        <p id="page-desc-quiz">Choose a category and start the quiz!</p>
      </div>

      <div class="quiz-container">

        <!-- VIEW 1: Category Selection -->
        <div class="quiz-view active" id="quiz-category-view">
          <div class="quiz-categories" id="quiz-categories">
            <!-- Loaded from JS -->
          </div>
        </div>

        <!-- VIEW 2: Question -->
        <div class="quiz-view" id="quiz-question-view">
          <div class="quiz-progress">
            <div class="progress-labels">
              <span id="progress-label">Progress</span>
              <span id="progress-count">0/0</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>

          <div class="question-card">
            <div class="question-number" id="question-number">Question 1 of 10</div>
            <div class="question-text" id="question-text"></div>
            <div class="answer-options" id="answer-options">
              <!-- Generated by JS -->
            </div>
            <div id="quiz-feedback" aria-live="polite"></div>
            <div class="quiz-actions" id="quiz-actions"></div>
          </div>
        </div>

        <!-- VIEW 3: Score -->
        <div class="quiz-view" id="quiz-score-view">
          <div class="score-screen">
            <div class="score-ring">
              <svg viewBox="0 0 140 140">
                <circle class="track" cx="70" cy="70" r="60"></circle>
                <circle class="fill" id="score-fill" cx="70" cy="70" r="60"></circle>
              </svg>
              <div class="score-number" id="score-number" aria-live="assertive">0/0</div>
            </div>
            <div class="score-message" id="score-message"></div>
            <div class="score-message-am" id="score-message-am"></div>
            <div class="score-actions" id="score-actions"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="footer-cross" aria-hidden="true">&#x2720;</span>
    <p>&copy; 2026 OrthodoxKids</p>
    <p id="footer-tagline">Built with faith for young learners</p>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="fathers.html">Fathers</a>
      <a href="history.html">History</a>
      <a href="quiz.html">Quiz</a>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/content-loader.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
